name: update-readme-badges

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 7 * * *' # runs daily at 07:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-badges:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          
      - name: install & run user-readme-badge-generator
        id: user-readme-badge-generator
        run: |
          cd .github/actions/user-readme-badge-generator
          npm install --no-audit --no-fund
          node src/index.js
        env:
          INPUT_USERNAME: ${{ github.repository_owner }}
          INPUT_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_GRAPHQL_URL: ${{ github.graphql_url }}
          INPUT_DAYS: '30'
          INPUT_COLOR: 'blue'
          INPUT_LABEL_COLOR: '555'
    
      - name: write to job summary
        run: |
          echo "${{ steps.user-readme-badge-generator.outputs.badges }}" >> $GITHUB_STEP_SUMMARY

      - name: add to readme
        run: |
          readme=README.md
          
          # get SHA256 before
          beforeHash=$(sha256sum $readme | awk '{ print $1 }')
          
          # Define start and end markers
          startMarker="<!-- start user badges -->"
          endMarker="<!-- end user badges -->"
          
          replacement="${{ steps.user-readme-badge-generator.outputs.badges }}"
          
          # Escape special characters in the replacement text
          replacementEscaped=$(printf '%s\n' "$replacement" | perl -pe 's/([\\\/\$\(\)@])/\\$1/g')
          
          # Use perl to replace the text between the markers
          perl -i -pe "BEGIN{undef $/;} s/\Q$startMarker\E.*?\Q$endMarker\E/$startMarker\n$replacementEscaped\n$endMarker/smg" $readme
          # get SHA256 after
          afterHash=$(sha256sum $readme | awk '{ print $1 }')
          # Compare the hashes and commit if required
          if [ "$afterHash" = "$beforeHash" ]; then
            echo "The hashes are equal - exiting script"
            exit 0
          else
            git config --global user.name 'github-actions[bot]'
            git config --global user.email 'github-actions[bot]@users.noreply.github.com'
            git add $readme
            git commit -m "docs: update readme badges"
            git push
          fi

      - name: Test GraphQL token access
        run: |
          cat > /tmp/query.graphql <<'GRAPHQL'
          query { viewer { login } }
          GRAPHQL
          curl -s -X POST -H "Authorization: bearer ${{ steps.app-token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"query { viewer { login } }"}' \
            https://api.github.com/graphql | jq .
            
