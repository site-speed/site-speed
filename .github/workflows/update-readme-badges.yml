name: update-readme-badges

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 7 * * *' # runs daily at 07:00
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  artifact-metadata: read
  

jobs:
  generate-badges:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Setup Node 24
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24.x'

      - name: Confirm node & npm
        run: |
          node --version
          npm --version

      - name: install & run user-readme-badge-generator
        id: user-readme-badge-generator
        working-directory: ./.github/actions/user-readme-badge-generator
        run: |
          set -euo pipefail
          # prefer npm ci for reproducible installs when lockfile exists
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

          echo "Installed packages:"
          ls -la node_modules | sed -n '1,200p' || true

          # verify the octokit import works (ESM dynamic import)
          node -e "import('@octokit/graphql').then(()=>console.log('@octokit/graphql OK')).catch(e=>{console.error('IMPORT ERROR:', e.message); process.exit(1)})"

          # run the action
          node src/index.js
        env:
          INPUT_USERNAME: ${{ github.repository_owner }}
          INPUT_TOKEN: ${{ steps.app-token.outputs.token }}
          # INPUT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_GRAPHQL_URL: ${{ github.graphql_url }}
          INPUT_DAYS: '30'
          INPUT_COLOR: 'blue'
          INPUT_LABEL_COLOR: '555'
          INPUT_EXCLUDE_FORKS: 'true'                  # <= new input: 'true' (default) or 'false'
          INPUT_BATCH_SIZE: '1'
          INPUT_DELAY_MS: '2000'
          INPUT_MAX_COMMIT_FALLBACK: '1000'           # cap per-repo processed commits in fallback
          INPUT_COMMIT_FALLBACK_THRESHOLD: '500'       # only fallback when repo commit count <= this
    
      - name: write to job summary
        run: |
          echo "${{ steps.user-readme-badge-generator.outputs.badges }}" >> $GITHUB_STEP_SUMMARY

      - name: add to readme
        id: add-to-readme
        env:
          # GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}    <= avoid token expiry if the main step above takes too long
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          #!/bin/bash
          set -euo pipefail

          echo "Timestamp: start add-to-readme step at $(date -u +%FT%T%Z)"

          readme=README.md

          # get SHA256 before
          beforeHash=$(sha256sum "$readme" | awk '{ print $1 }' || echo "")
          echo "Timestamp: beforeHash computed at $(date -u +%FT%T%Z) beforeHash=${beforeHash}"

          # Define start and end markers
          startMarker="<!-- start user badges -->"
          endMarker="<!-- end user badges -->"

          replacement="${{ steps.user-readme-badge-generator.outputs.badges }}"

          # Escape special characters in the replacement text for safe perl substitution
          replacementEscaped=$(printf '%s\n' "$replacement" | perl -pe 's/([\\\/\$\(\)@])/\\$1/g')

          # Use perl to replace the text between the markers
          perl -i -pe "BEGIN{undef $/;} s/\Q$startMarker\E.*?\Q$endMarker\E/$startMarker\n$replacementEscaped\n$endMarker/smg" "$readme"

          # get SHA256 after
          afterHash=$(sha256sum "$readme" | awk '{ print $1 }' || echo "")
          echo "Timestamp: afterHash computed at $(date -u +%FT%T%Z) afterHash=${afterHash}"

          # Compare the hashes and commit if required
          if [ "$afterHash" = "$beforeHash" ]; then
            echo "The hashes are equal - no README changes. Exiting at $(date -u +%FT%T%Z)"
            exit 0
          fi

          echo "README changed; preparing to commit at $(date -u +%FT%T%Z)"

          # Configure git author
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'

          # Ensure remote uses token auth for push
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # Stage and commit changes
          git add "$readme"
          git commit -m "docs: update readme badges"
          echo "Committed changes at $(date -u +%FT%T%Z)"

          # Determine branch to push: prefer GITHUB_REF branch if available, else current branch (or main)
          if [ -n "${GITHUB_REF:-}" ] && [[ "${GITHUB_REF}" == refs/heads/* ]]; then
            BRANCH="${GITHUB_REF#refs/heads/}"
          else
            BRANCH="$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo main)"
            if [ "${BRANCH}" = "HEAD" ]; then BRANCH="main"; fi
          fi
          echo "Branch to push: ${BRANCH}"

          # Fetch remote branch shallowly
          echo "Fetching origin/${BRANCH} at $(date -u +%FT%T%Z)..."
          git fetch origin "${BRANCH}" --depth=1 || true

          # If origin/BRANCH exists, attempt to rebase local commits onto it
          if git rev-parse --verify "origin/${BRANCH}" >/dev/null 2>&1; then
            echo "Attempting to rebase onto origin/${BRANCH} at $(date -u +%FT%T%Z)"
            if git rebase "origin/${BRANCH}"; then
              echo "Rebase successful at $(date -u +%FT%T%Z)"
            else
              echo "Rebase failed; aborting and creating fallback branch at $(date -u +%FT%T%Z)"
              git rebase --abort || true
              FALLBACK_BRANCH="update-readme-badges-$(date -u +%s)"
              git checkout -b "${FALLBACK_BRANCH}"
              git push -u origin "${FALLBACK_BRANCH}"
              echo "Pushed fallback branch: ${FALLBACK_BRANCH} at $(date -u +%FT%T%Z)"
              exit 0
            fi
          else
            echo "origin/${BRANCH} does not exist; no rebase required"
          fi

          # Try normal push first
          echo "Attempting git push origin ${BRANCH} at $(date -u +%FT%T%Z)"
          if git push origin "${BRANCH}"; then
            echo "Push succeeded at $(date -u +%FT%T%Z)"
            exit 0
          fi

          # If push rejected, try safe force-with-lease
          echo "Push rejected; attempting git push --force-with-lease origin ${BRANCH} at $(date -u +%FT%T%Z)"
          if git push --force-with-lease origin "${BRANCH}"; then
            echo "Force-with-lease push succeeded at $(date -u +%FT%T%Z)"
            exit 0
          fi

          # Final fallback: create a unique branch and push it
          FALLBACK_BRANCH="update-readme-badges-$(date -u +%s)"
          git checkout -b "${FALLBACK_BRANCH}"
          git push -u origin "${FALLBACK_BRANCH}"
          echo "Push to ${BRANCH} failed; pushed changes to branch ${FALLBACK_BRANCH} at $(date -u +%FT%T%Z)"
        shell: bash

      

      - name: Test GraphQL token access
        run: |
          cat > /tmp/query.graphql <<'GRAPHQL'
          query { viewer { login } }
          GRAPHQL
          curl -s -X POST -H "Authorization: bearer ${{ steps.app-token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"query { viewer { login } }"}' \
            https://api.github.com/graphql | jq .
            
